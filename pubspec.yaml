name: wed_plan_pilot
description: "Wedpilot - AI-powered cross-platform wedding planning application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP & networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  connectivity_plus: ^6.1.3

  # Local storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.69.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  confetti: ^0.7.0

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7

  # Sharing
  share_plus: ^10.1.2
  url_launcher: ^6.3.1

  # QR Code
  qr_flutter: ^4.1.0

  # SVG
  flutter_svg: ^2.0.10+1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Responsive layout
  flutter_screenutil: ^5.9.3

  # Calendar
  table_calendar: ^3.1.2

  # PDF & printing
  pdf: ^3.11.1
  printing: ^5.13.2

  # File picker
  file_picker: ^8.1.4

  # Shimmer loading effect
  shimmer: ^3.0.0

  # Progress indicators
  percent_indicator: ^4.2.3

  # Badges
  badges: ^3.1.2

  # Timeline
  timeline_tile: ^2.0.0

  # Pin / OTP input
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
